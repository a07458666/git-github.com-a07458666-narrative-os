<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NarrativeOS</title>

    <!-- Inter Variable font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..700;1,14..32,300..700&display=swap" rel="stylesheet" />

    <style>
      /* ── Reset ─────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Design tokens (CSS custom properties) ─────────────── */
      :root {
        /* Background layers */
        --bg-base:     #1C1B22;
        --bg-elevated: #252430;
        --bg-raised:   #2E2C3A;
        --bg-overlay:  #3A3848;

        /* Text */
        --text-primary:   #F0EEF8;
        --text-secondary: #9C99B0;
        --text-muted:     #5C5A6E;

        /* Borders */
        --border:       #2A2838;
        --border-light: #343244;

        /* Accent — Indigo */
        --accent:        #7C6FFF;
        --accent-dim:    #2D2660;
        --accent-border: #4D43A8;

        /* Semantic */
        --green:      #4ADE80;
        --green-dim:  #14532D;
        --yellow:     #FBBF24;
        --yellow-dim: #78350F;
        --red:        #F87171;
        --red-dim:    #7F1D1D;
        --blue:       #60A5FA;
        --blue-dim:   #1E3A5F;
      }

      /* ── Base ───────────────────────────────────────────────── */
      html, body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 14px;
        font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: var(--bg-base);
        color: var(--text-primary);
        line-height: 1.6;
      }

      #root {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Scrollbar ──────────────────────────────────────────── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--bg-overlay); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #4A4860; }

      /* ── Selection ──────────────────────────────────────────── */
      ::selection { background: #3D2F8A; color: var(--text-primary); }

      /* ── Focus ring ─────────────────────────────────────────── */
      :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
      button:focus-visible, a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

      /* ── Button / Input base reset ──────────────────────────── */
      button { font-family: inherit; }
      input, textarea, select { font-family: inherit; }
      a { color: inherit; }

      /* ── Transitions ────────────────────────────────────────── */
      button { transition: opacity 0.1s, background 0.15s, border-color 0.15s; }
      button:hover:not(:disabled) { opacity: 0.85; }
      button:disabled { opacity: 0.35; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
