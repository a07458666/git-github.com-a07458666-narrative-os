name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Frontend: TypeScript + Build ────────────────────────────
  frontend:
    name: Frontend (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

  # ── Backend: Lint + Import check ────────────────────────────
  backend:
    name: Backend (ruff + imports)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install ruff -r requirements.txt

      - name: Lint with ruff
        run: ruff check agent/ backend/ kg/ mcp_server/ scripts/

      - name: Check imports (no relative import errors)
        run: |
          python -c "from agent import director, config, consistency, logger, tools; print('agent OK')"
          python -c "from kg import schema, crud, client; print('kg OK')"
          python -c "from backend import main; print('backend OK')"
